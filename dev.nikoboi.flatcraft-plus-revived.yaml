app-id: dev.nikoboi.flatcraft-plus-revived
runtime: org.freedesktop.Platform
runtime-version: "23.08"
sdk: org.freedesktop.Sdk
sdk-extensions:
    - org.freedesktop.Sdk.Extension.openjdk8

command: flatcraft-plus

build-options:
    build-args:
        - --share=network
    env:
        # Point these to the location where we will install Java in the next step
        JAVA_HOME: /app/jre
        PATH: /app/bin:/usr/bin:/app/jre/bin

finish-args:
    - --share=ipc
    - --socket=x11
    - --socket=pulseaudio
    - --device=all
    - --share=network
    # Ensure the app sees the Java path when running
    - --env=PATH=/app/bin:/usr/bin:/app/jre/bin
    - --env=JAVA_HOME=/app/jre

modules:
    - name: openjdk
      buildsystem: simple
      build-commands:
          # This script is provided by the extension to bundle the JRE into /app/jre
          - /usr/lib/sdk/openjdk8/install.sh

    - name: flatcraft
      buildsystem: simple
      build-commands:
          - . /usr/lib/sdk/openjdk8/enable.sh && ./gradlew jar
          - mkdir -p /app/bin /app/share/flatcraft
          - install -D build/libs/minicraft-plus-2.3.0-infdev3.jar /app/share/flatcraft/minicraft-plus.jar
          - install -D flatcraft.sh /app/bin/flatcraft-plus
          - install -D dev.nikoboi.flatcraft-plus-revived.desktop /app/share/applications/dev.nikoboi.flatcraft-plus-revived.desktop
          - install -D dev.nikoboi.flatcraft-plus-revived.png /app/share/icons/hicolor/256x256/apps/dev.nikoboi.flatcraft-plus-revived.png
      sources:
          - type: dir
            path: .
