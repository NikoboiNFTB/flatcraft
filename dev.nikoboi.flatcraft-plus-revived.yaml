app-id: dev.nikoboi.flatcraft-plus-revived
runtime: org.freedesktop.Platform
runtime-version: "23.08"
sdk: org.freedesktop.Sdk
# This ensures the extension is available for building
sdk-extensions:
    - org.freedesktop.Sdk.Extension.openjdk8

extensions:
    com.flatpak.Extension.openjdk8:
        directory: lib/sdk/openjdk8
        add-ld-path: lib
        no-autodownload: false
        version: "23.08"

build-options:
    build-args:
        - --share=network
    # This sets the environment variables so the app can find 'java'
    env:
        PATH: /app/bin:/usr/bin:/lib/sdk/openjdk8/bin
        JAVA_HOME: /lib/sdk/openjdk8

command: flatcraft-plus
finish-args:
    - --share=ipc
    - --socket=x11
    - --socket=pulseaudio
    - --device=all
    - --share=network

modules:
    - name: flatcraft
      buildsystem: simple
      build-commands:
          - . /usr/lib/sdk/openjdk8/enable.sh && ./gradlew jar
          - mkdir -p /app/bin /app/share/flatcraft
          - install -D build/libs/minicraft-plus-2.3.0-infdev3.jar /app/share/flatcraft/minicraft-plus.jar
          - install -D flatcraft.sh /app/bin/flatcraft-plus
          - install -D dev.nikoboi.flatcraft-plus-revived.desktop /app/share/applications/dev.nikoboi.flatcraft-plus-revived.desktop
          - install -D dev.nikoboi.flatcraft-plus-revived.png /app/share/icons/hicolor/256x256/apps/dev.nikoboi.flatcraft-plus-revived.png
      sources:
          - type: dir
            path: .
